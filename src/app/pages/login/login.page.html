<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">

  <!-- Logo o título -->
  <div class="logo-container">
    <img src="assets/reyes-piscinas.png" alt="App Logo" class="logo" />
  </div>

  <!-- Formulario de login -->
  <ion-card>
    <ion-card-content>
      <ion-item>
        <ion-label position="floating">Usuario</ion-label>
        <ion-input type="text" [(ngModel)]="email"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Contraseña</ion-label>
        <ion-input type="password" [(ngModel)]="password"></ion-input>
      </ion-item>

      <!-- <ion-button expand="block" (click)="login()">Iniciar Sesión</ion-button> -->

      <!-- Separador -->
      <div class="separator">
        <span>O</span>
      </div>

      <!-- Botón de Google para Móvil -->
      <ion-button
        *ngIf="isMobile"
        expand="block"
        fill="outline"
        (click)="loginWithGoogle()"
        [disabled]="isLoading"
      >
        <img *ngIf="!isLoading" src="assets/google-icon.svg" alt="Google" class="google-icon" />
        <ion-spinner *ngIf="isLoading" name="crescent" color="primary"></ion-spinner>
        <span>{{ isLoading ? 'Conectando...' : 'Continuar con Google ' }}</span>
      </ion-button>

      <!-- Botón de Google para Web -->
      <ion-button
        *ngIf="!isMobile"
        expand="block"
        fill="outline"
        (click)="loginWithGoogle()"
        [disabled]="isLoading"
      >
        <img *ngIf="!isLoading" src="assets/google-icon.svg" alt="Google" class="google-icon" />
        <ion-spinner *ngIf="isLoading" name="crescent" color="primary"></ion-spinner>
        <span>{{ isLoading ? 'Conectando...' : 'Continuar con Google (Web)' }}</span>
      </ion-button>

      <!-- Mensaje de error -->
      <ion-text color="danger" *ngIf="errorMessage">
        {{ errorMessage }}
      </ion-text>
    </ion-card-content>
  </ion-card>

</ion-content>

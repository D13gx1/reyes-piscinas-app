<ion-header [translucent]="true">
  <ion-toolbar class="header-toolbar">
    <ion-title class="fade-in">Mi Perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="profile-content">
  <!-- Avatar + Nombre -->
  <div class="profile-header ion-text-center fade-in-up">
    <h2>{{ userName }}</h2>
  </div>

  <!-- Opciones de Perfil -->
  <ion-list class="fade-in-up delay-1">
    <ion-item button detail="false">
      <ion-icon name="person-outline" slot="start"></ion-icon>
      <ion-label>Editar perfil</ion-label>
    </ion-item>

    <ion-item button detail="false">
      <ion-icon name="notifications-outline" slot="start"></ion-icon>
      <ion-label>Notificaciones</ion-label>
      <ion-toggle slot="end" [checked]="true"></ion-toggle>
    </ion-item>

    <ion-item button detail="false">
      <ion-icon name="help-circle-outline" slot="start"></ion-icon>
      <ion-label>Ayuda y soporte</ion-label>
    </ion-item>
  </ion-list>

  <!-- Botón Cerrar Sesión -->
  <div class="ion-padding fade-in-up delay-2">
    <ion-button 
      expand="block" 
      color="danger" 
      shape="round"
      (click)="logout()"
    >
      <ion-icon name="log-out-outline" slot="start"></ion-icon>
      Cerrar sesión
    </ion-button>
  </div>
</ion-content>

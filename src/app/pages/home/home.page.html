<ion-header>
  <ion-toolbar>
    <ion-title>Reyes Piscinas</ion-title>
    <ion-buttons slot="end">
      <ion-button fill="clear">
        <ion-icon name="refresh-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- Fecha actual -->
  <ion-card>
    <ion-card-header>
      <ion-card-title>{{ fechaHoy }}</ion-card-title>
      <ion-card-subtitle>Resumen del día</ion-card-subtitle>
    </ion-card-header>
  </ion-card>

  <!-- Clientes con mantención hoy -->
  <ion-list>
    <ion-list-header>
      <ion-label>Clientes pendientes</ion-label>
    </ion-list-header>

    <ion-item *ngFor="let cliente of clientesPendientes">
      <ion-label>
        <h2>{{ cliente.nombre }}</h2>
        <p>{{ cliente.direccion }}</p>
        <p>Horario: {{ cliente.horario }}</p>
      </ion-label>
      <ion-button color="success" (click)="marcarRealizado(cliente)">
        Marcar realizado
      </ion-button>
    </ion-item>
  </ion-list>

  <!-- Clientes realizados -->
  <ion-list *ngIf="clientesRealizados.length > 0">
    <ion-list-header color="medium">
      <ion-label>Clientes realizados</ion-label>
    </ion-list-header>

    <ion-item *ngFor="let cliente of clientesRealizados">
      <ion-label>
        <h2>{{ cliente.nombre }}</h2>
        <p>{{ cliente.direccion }}</p>
        <p>✔ Mantención completada</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
